<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Slice Society{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}">The Slice Society</a>

        <nav>
            <a href="{{ url_for('index') }}#menu">Menu</a>
            <a href="{{ url_for('index') }}#story">History</a>
            <a href="{{ url_for('index') }}#locations">Locations</a>
            <a href="{{ url_for('index') }}#contact">Contact</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Est. 2026 - The Slice Society</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
